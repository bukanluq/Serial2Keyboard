name: Build Serial2Keyboard Apps

# This tells GitHub to run the build every time you upload new code
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    # Run this job 3 times: on Windows, Mac, and Linux
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Linux requires an extra system library for the UI to compile
    - name: Install Linux UI Dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y python3-tk

    - name: Install Python Libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: pyinstaller --onefile --windowed --noconsole main.py

    # This zips up the final .exe, .app, and Linux binary so you can download it
    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: Serial2Keyboard-${{ runner.os }}
        path: dist/*