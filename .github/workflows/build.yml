name: Build Serial2Key Executables

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            artifact_name: Serial2Key-Windows.exe
            build_command: pyinstaller --noconsole --onefile --name Serial2Key-Windows main.py
            
          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-latest
            artifact_name: Serial2Key-macOS-AppleSilicon
            build_command: pyinstaller --noconsole --onefile --name Serial2Key-macOS-AppleSilicon main.py
            
          # macOS Intel
          - os: macos-11
            artifact_name: Serial2Key-macOS-Intel
            build_command: pyinstaller --noconsole --onefile --name Serial2Key-macOS-Intel main.py
            
          # Linux x64 (Ubuntu)
          - os: ubuntu-latest
            artifact_name: Serial2Key-Linux-x64
            build_command: pyinstaller --noconsole --onefile --name Serial2Key-Linux-x64 main.py

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 3.11 is highly stable for compiling UI apps

    - name: Install Linux System Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk python3-dev libx11-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Executable with PyInstaller
      run: ${{ matrix.build_command }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          dist/*.exe
          dist/Serial2Key*
